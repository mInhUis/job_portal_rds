name: Backend CI/CD
on:
  push:
    branches: [main]
    paths: ['backend/**'] 

env:
  AWS_REGION: ap-southeast-2
  ECR_REPO: job_portal_backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # for OIDC keyless auth
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::698220459817:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}
      
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::698220459817:role/github-actions-deploy
          aws-region: ap-southeast-2

      - name: Install Ansible
        run: |
          pip install "ansible-core>=2.13.9" boto3
          ansible --version
          ansible-galaxy collection install amazon.aws

      - name: install aws ssm plugin
        run: | 
          curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
          sudo dpkg -i session-manager-plugin.deb

      - name: Run playbook
        working-directory: ./ansible
        run: |
          ansible-playbook -i inventory/aws_ec2.yml deploy.yml \
            -e "image_tag=${{ github.sha }}" \
            -e "ecr_registry=698220459817.dkr.ecr.ap-southeast-2.amazonaws.com"